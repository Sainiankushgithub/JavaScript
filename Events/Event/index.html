<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Handling with Smooth Transition</title>

  <style>

    body{
      background-color: black;
      font-family: Arial, sans-serif;
    }

    h1{
      color: white;
    }

    button{
      padding: 6px 12px;
      border-radius: 10px;
      background-color: yellow;
      color: black;
      margin-right: 20px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
    }

    .container{
      margin-top: 20px;
    }

    /* Rectangle default state */
    .rectangle{
      width: 200px;
      height: 200px;
      background-color: grey;
      border-radius: 5px;

      /* Smooth transition */
      transition: all 0.6s ease;
    }

    /* Transition state */
    .addTransition{
      border-radius: 50%;
      background-color: yellow;
      transform: translateX(30rem);
    }
    /* Transition state 2 for mouse over */
    .addTransition2{
      border-radius: 50%;
      background-color: yellow;
      transform: translateY(-10rem);
    }
    /* Transition state 3 for mouse down  */
    .addTransition3{
      border-radius: 50%;
      transform: translateX(10rem);
    }

  </style>

</head>
<body>

  <!-- Inline Event -->
  <div class="container">
    <h1>Inline Event</h1>

    <button onclick="alert('Welcome')">Greeting</button>

    <button ondblclick="alert('Welcome Double Click')">
      Greeting Double Click
    </button>

    <button onmouseover="alert('Welcome Mouse Over')">
      Greeting Mouse Over
    </button>
  </div>


  <!-- DOM Event Handler -->
  <div class="container">
    <h1>DOM Event Handler</h1>

    <button id="btn1">Greeting</button>
    <button id="btn2">Greeting Double Click</button>
    <button id="btn3">Greeting Mouse Over</button>

  </div>


  <!-- addEventListener -->
  <div class="container">
    <h1>addEventListener Event Handler</h1>

    <button id="btn4">Greeting Click</button>
    <button id="btn5">Greeting Mouse Over</button>

  </div>


  <!-- Rectangle animation section -->
  <div style="margin-top: 20px; margin-left: 50%;" class="container">

    <div class="rectangle"></div>

    <button id="myButton">Click / Hover</button>

  </div>


  <!-- JavaScript -->
  <script>

    // DOM Event Handler
    document.getElementById('btn1').onclick = function(){
      alert('Welcome to JS Course');
    };

    document.getElementById('btn2').ondblclick = function(){
      alert('Welcome Double Click');
    };

    document.getElementById('btn3').onmouseover = function(){
      alert('Welcome Mouse Over');
    };


    // addEventListener
    document.getElementById('btn4').addEventListener('click', function(){
      alert('Welcome using addEventListener Click');
    });

    document.getElementById('btn5').addEventListener('mouseover', function(){
      alert('Welcome using addEventListener Mouse Over');
    });



    // Rectangle animation logic

    const myButton = document.getElementById('myButton');
    const recDiv = document.querySelector('.rectangle');

    let flag = true;

    // Toggle color on click
    myButton.addEventListener('click', function(){

      if(flag){
        recDiv.style.backgroundColor = "red";
        flag = false;
      }
      else{
        recDiv.style.backgroundColor = "yellow";
        flag = true;
      }

    });


    // Add transition on mouse enter button
    myButton.addEventListener('mouseenter', function(){
      recDiv.classList.add('addTransition');

    });


    // Remove transition on mouse leave button
    myButton.addEventListener('mouseleave', function(){

      recDiv.classList.remove('addTransition');

    });

    // Add transition on mouse over button 
    recDiv.addEventListener('mouseover',function(){
      recDiv.classList.add('addTransition2');
    })
    // Remove Transition on mouse leave button 
    recDiv.addEventListener('mouseleave',function(){
      recDiv.classList.remove('addTransition2');
    })
    // Add Transition on mouse down when mouse is pressed 
    recDiv.addEventListener('mousedown',function(){
      recDiv.classList.add('addTransition3');
    })
    // Remove Transition When button is released 
    recDiv.addEventListener('mouseup',function(){
      recDiv.classList.remove('addTransition3');
    })
    
  </script>

</body>
</html>
